<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Nutrition Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --bg:           #191919;
      --surface:      #242424;
      --surface-2:    #1e3352;
      --surface-card: #1e2d45;
      --border:       rgba(80, 120, 180, 0.18);
      --border-mid:   rgba(80, 120, 180, 0.35);
      --border-hi:    rgba(100, 150, 210, 0.55);
      --text:         #d8e4f0;
      --text-muted:   #7a9bbf;
      --text-hint:    #4a6a8a;
      --blue-ring:    #4a90d9;
      --blue-light:   rgba(74, 144, 217, 0.18);
      --blue-mid:     #2d5a8e;
      --accent:       #5b9bd5;
      --accent-dim:   rgba(91, 155, 213, 0.15);
      --red:          #c97070;
      --red-light:    rgba(180, 80, 80, 0.15);
      --green:        #6aab6a;
      --green-light:  rgba(100, 170, 100, 0.15);
      --radius-md:    8px;
      --radius-lg:    12px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    #app { max-width: 640px; margin: 0 auto; }

    .page-title {
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.25rem;
    }

    .top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }

    .ring-card {
      background: var(--surface-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
    }

    .ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .ring-wrap svg { width: 64px; height: 64px; transform: rotate(-90deg); }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-pct { font-size: 12px; font-weight: 500; color: var(--text); font-family: var(--font-mono); }
    .ring-info { flex: 1; min-width: 0; }
    .ring-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .ring-nums { font-size: 14px; font-weight: 500; color: var(--text); }
    .ring-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .over { color: var(--red) !important; }

    .form-card {
      background: var(--surface-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem;
    }

    .form-grid { display: grid; grid-template-columns: 1fr 84px 84px; gap: 8px; margin-bottom: 8px; }

    .form-grid input {
      height: 36px; padding: 0 10px; font-size: 13px;
      border: 0.5px solid var(--border); border-radius: var(--radius-md);
      background: var(--surface-2); color: var(--text); font-family: var(--font-mono);
      width: 100%; outline: none; transition: border-color 0.15s;
    }
    .form-grid input::placeholder { color: var(--text-hint); }
    .form-grid input:focus { border-color: var(--border-hi); }

    .add-btn {
      width: 100%; height: 36px; background: var(--surface-2);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      font-size: 13px; color: var(--text-muted); cursor: pointer; font-family: var(--font-mono);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.12s, color 0.12s;
    }
    .add-btn:hover { background: var(--blue-mid); color: var(--text); }
    .add-btn:active { transform: scale(0.98); }

    .log-card {
      background: var(--surface-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.25rem;
    }

    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 1.25rem; border-bottom: 0.5px solid var(--border);
    }
    .log-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    .clear-btn {
      font-size: 11px; color: var(--text-hint); background: none; border: none;
      cursor: pointer; font-family: var(--font-mono); padding: 3px 8px;
      border-radius: var(--radius-md); transition: background 0.12s, color 0.12s;
    }
    .clear-btn:hover { background: var(--surface-2); color: var(--text-muted); }

    .log-empty { padding: 2rem 1.25rem; text-align: center; font-size: 13px; color: var(--text-hint); }

    .log-entry {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      gap: 12px; padding: 10px 1.25rem; border-bottom: 0.5px solid var(--border);
    }
    .log-entry:last-child { border-bottom: none; }
    .entry-food { font-size: 13px; color: var(--text); }
    .entry-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .entry-stats { display: flex; align-items: center; gap: 8px; }

    .stat-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
    .cal-pill { background: var(--accent-dim); color: var(--accent); }
    .pro-pill { background: var(--blue-light); color: var(--blue-ring); }

    .del-btn {
      background: none; border: none; cursor: pointer; color: var(--text-hint);
      padding: 4px; border-radius: 4px; display: flex; align-items: center;
      font-size: 15px; line-height: 1; transition: background 0.12s, color 0.12s;
    }
    .del-btn:hover { color: var(--red); background: var(--red-light); }

    /* ── history section ── */
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 2rem 0 1.25rem;
    }
    .divider-line { flex: 1; height: 0.5px; background: var(--border); }
    .divider-label { font-size: 11px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }

    .history-empty { font-size: 13px; color: var(--text-hint); text-align: center; padding: 1.5rem 0; }

    .history-day {
      background: var(--surface-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 10px;
    }

    .history-header {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      padding: 10px 1.25rem; cursor: pointer; user-select: none;
      transition: background 0.12s;
    }
    .history-header:hover { background: rgba(80,120,180,0.07); }

    .history-date { font-size: 13px; color: var(--text); }
    .history-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .history-pills { display: flex; align-items: center; gap: 8px; }
    .history-pill {
      font-size: 11px; font-weight: 500; padding: 2px 10px;
      border-radius: 99px; white-space: nowrap;
    }
    .cal-goal-met { background: var(--green-light); color: var(--green); }
    .cal-goal-over { background: var(--red-light); color: var(--red); }
    .cal-goal-under { background: var(--accent-dim); color: var(--accent); }
    .pro-goal-met { background: var(--green-light); color: var(--green); }
    .pro-goal-miss { background: var(--blue-light); color: var(--blue-ring); }

    .chevron { font-size: 14px; color: var(--text-hint); margin-left: 8px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    .history-entries { border-top: 0.5px solid var(--border); display: none; }
    .history-entries.open { display: block; }

    .history-entry {
      display: grid; grid-template-columns: 1fr auto; align-items: center;
      gap: 12px; padding: 8px 1.25rem; border-bottom: 0.5px solid var(--border);
    }
    .history-entry:last-child { border-bottom: none; }
    .history-entry-food { font-size: 12px; color: var(--text-muted); }
    .history-entry-time { font-size: 10px; color: var(--text-hint); margin-top: 1px; }
    .history-entry-stats { display: flex; gap: 6px; }
    .h-pill { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 99px; }

    .bar-row { padding: 10px 1.25rem 12px; border-top: 0.5px solid var(--border); }
    .bar-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-hint); margin-bottom: 5px; }
    .bar-track { height: 4px; background: rgba(80,120,180,0.12); border-radius: 99px; overflow: hidden; margin-bottom: 8px; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface-card); border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); padding: 8px 18px; font-size: 13px;
      color: var(--text); font-family: var(--font-mono); opacity: 0;
      transition: opacity 0.2s; pointer-events: none; z-index: 99; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .top-row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr 72px 72px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="page-title" id="page-date">daily nutrition</div>

  <div class="top-row">
    <div class="ring-card">
      <div class="ring-wrap">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(80,120,180,0.15)" stroke-width="6"/>
          <circle cx="32" cy="32" r="26" fill="none" stroke="#5b9bd5" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="163.4" id="cal-arc" stroke-dashoffset="163.4"
            style="transition:stroke-dashoffset 0.4s ease;"/>
        </svg>
        <div class="ring-center"><span class="ring-pct" id="cal-pct">0%</span></div>
      </div>
      <div class="ring-info">
        <div class="ring-label">calories</div>
        <div class="ring-nums" id="cal-nums">0 / 2000</div>
        <div class="ring-sub" id="cal-remain">2000 remaining</div>
      </div>
    </div>

    <div class="ring-card">
      <div class="ring-wrap">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(80,120,180,0.15)" stroke-width="6"/>
          <circle cx="32" cy="32" r="26" fill="none" stroke="#4a90d9" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="163.4" id="pro-arc" stroke-dashoffset="163.4"
            style="transition:stroke-dashoffset 0.4s ease;"/>
        </svg>
        <div class="ring-center"><span class="ring-pct" id="pro-pct">0%</span></div>
      </div>
      <div class="ring-info">
        <div class="ring-label">protein</div>
        <div class="ring-nums" id="pro-nums">0g / 160g</div>
        <div class="ring-sub" id="pro-remain">160g remaining</div>
      </div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <input type="text" id="food-input" placeholder="food description…" autocomplete="off" />
      <input type="number" id="cal-input" placeholder="kcal" min="0" />
      <input type="number" id="pro-input" placeholder="protein g" min="0" />
    </div>
    <button class="add-btn" onclick="addEntry()">
      <i class="ti ti-plus" aria-hidden="true"></i> log entry
    </button>
  </div>

  <div class="log-card">
    <div class="log-header">
      <span class="log-title" id="log-date-label">today's log</span>
      <button class="clear-btn" onclick="clearDay()">clear day</button>
    </div>
    <div id="log-body">
      <div class="log-empty">no entries yet — log your first meal above</div>
    </div>
  </div>

  <!-- history -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-label"><i class="ti ti-history" aria-hidden="true"></i> past days</span>
    <div class="divider-line"></div>
  </div>

  <div id="history-body">
    <div class="history-empty">no past data yet</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CAL_GOAL = 2000, PRO_GOAL = 160, CIRC = 163.4;

  function todayKey() {
    const d = new Date();
    return 'log_' + d.getFullYear() + '_' + (d.getMonth()+1) + '_' + d.getDate();
  }

  function loadData() {
    try { return JSON.parse(localStorage.getItem(todayKey()) || '[]'); } catch(e) { return []; }
  }

  function saveData(entries) { localStorage.setItem(todayKey(), JSON.stringify(entries)); }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function formatDate() {
    return new Date().toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function keyToDate(key) {
    const [, y, m, d] = key.split('_');
    return new Date(+y, +m - 1, +d);
  }

  function friendlyDate(key) {
    const d = keyToDate(key);
    const today = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
    d.setHours(0,0,0,0);
    if (d.getTime() === today.getTime()) return 'today';
    if (d.getTime() === yesterday.getTime()) return 'yesterday';
    return d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function getPastKeys() {
    const tk = todayKey();
    return Object.keys(localStorage)
      .filter(k => k.startsWith('log_') && k !== tk)
      .sort((a, b) => keyToDate(b) - keyToDate(a));
  }

  function toggleDay(key) {
    const entries = document.getElementById('entries-' + key);
    const chevron = document.getElementById('chev-' + key);
    if (!entries) return;
    const open = entries.classList.toggle('open');
    chevron.classList.toggle('open', open);
  }

  function renderHistory() {
    const keys = getPastKeys();
    const body = document.getElementById('history-body');
    if (!keys.length) {
      body.innerHTML = '<div class="history-empty">no past data yet — come back tomorrow</div>';
      return;
    }

    body.innerHTML = keys.map(key => {
      let entries = [];
      try { entries = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) {}
      const totCal = entries.reduce((s,e) => s+e.cal, 0);
      const totPro = entries.reduce((s,e) => s+e.pro, 0);
      const calPct = Math.round(Math.min(totCal/CAL_GOAL,1)*100);
      const proPct = Math.round(Math.min(totPro/PRO_GOAL,1)*100);
      const calOver = totCal > CAL_GOAL;
      const calMet = totCal >= CAL_GOAL * 0.9 && !calOver;
      const calClass = calOver ? 'cal-goal-over' : calMet ? 'cal-goal-met' : 'cal-goal-under';
      const proMet = totPro >= PRO_GOAL * 0.9;
      const proClass = proMet ? 'pro-goal-met' : 'pro-goal-miss';
      const calBarW = Math.min(calPct, 100);
      const proBarW = Math.min(proPct, 100);
      const calBarColor = calOver ? '#c97070' : calMet ? '#6aab6a' : '#5b9bd5';
      const proBarColor = proMet ? '#6aab6a' : '#4a90d9';
      const safeKey = key.replace(/_/g, '-');

      const entryRows = entries.length
        ? [...entries].reverse().map(e => `
          <div class="history-entry">
            <div>
              <div class="history-entry-food">${escHtml(e.food)}</div>
              <div class="history-entry-time">${formatTime(e.ts)}</div>
            </div>
            <div class="history-entry-stats">
              <span class="h-pill cal-pill">${e.cal} kcal</span>
              <span class="h-pill pro-pill">${e.pro}g</span>
            </div>
          </div>`).join('')
        : '<div class="log-empty" style="padding:1rem;">no entries</div>';

      return `
        <div class="history-day">
          <div class="history-header" onclick="toggleDay('${safeKey}')">
            <div>
              <div class="history-date">${friendlyDate(key)}</div>
              <div class="history-meta">${entries.length} item${entries.length !== 1 ? 's' : ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="history-pills">
                <span class="history-pill ${calClass}">${totCal} kcal</span>
                <span class="history-pill ${proClass}">${totPro}g protein</span>
              </div>
              <i class="ti ti-chevron-down chevron" id="chev-${safeKey}" aria-hidden="true"></i>
            </div>
          </div>
          <div class="history-entries" id="entries-${safeKey}">
            <div class="bar-row">
              <div class="bar-label"><span>calories</span><span>${totCal} / ${CAL_GOAL}</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${calBarW}%;background:${calBarColor};"></div></div>
              <div class="bar-label"><span>protein</span><span>${totPro}g / ${PRO_GOAL}g</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${proBarW}%;background:${proBarColor};"></div></div>
            </div>
            ${entryRows}
          </div>
        </div>`;
    }).join('');
  }

  function render() {
    const entries = loadData();
    const totCal = entries.reduce((s,e) => s+e.cal, 0);
    const totPro = entries.reduce((s,e) => s+e.pro, 0);
    const calPct = Math.min(totCal/CAL_GOAL, 1);
    const proPct = Math.min(totPro/PRO_GOAL, 1);

    document.getElementById('cal-arc').style.strokeDashoffset = (CIRC*(1-calPct)).toFixed(1);
    document.getElementById('pro-arc').style.strokeDashoffset = (CIRC*(1-proPct)).toFixed(1);
    document.getElementById('cal-pct').textContent = Math.round(calPct*100) + '%';
    document.getElementById('pro-pct').textContent = Math.round(proPct*100) + '%';

    const calOver = totCal > CAL_GOAL, proOver = totPro > PRO_GOAL;
    document.getElementById('cal-nums').textContent = totCal + ' / ' + CAL_GOAL;
    document.getElementById('cal-nums').className = 'ring-nums' + (calOver ? ' over' : '');
    document.getElementById('pro-nums').textContent = totPro + 'g / ' + PRO_GOAL + 'g';
    document.getElementById('pro-nums').className = 'ring-nums' + (proOver ? ' over' : '');
    document.getElementById('cal-remain').textContent = calOver ? (totCal-CAL_GOAL)+' over goal' : (CAL_GOAL-totCal)+' remaining';
    document.getElementById('cal-remain').className = 'ring-sub' + (calOver ? ' over' : '');
    document.getElementById('pro-remain').textContent = proOver ? (totPro-PRO_GOAL)+'g over goal' : (PRO_GOAL-totPro)+'g remaining';
    document.getElementById('pro-remain').className = 'ring-sub' + (proOver ? ' over' : '');
    document.getElementById('page-date').textContent = formatDate();

    const body = document.getElementById('log-body');
    if (!entries.length) {
      body.innerHTML = '<div class="log-empty">no entries yet — log your first meal above</div>';
    } else {
      body.innerHTML = [...entries].reverse().map((e, ri) => {
        const realIdx = entries.length - 1 - ri;
        return `<div class="log-entry">
          <div>
            <div class="entry-food">${escHtml(e.food)}</div>
            <div class="entry-time">${formatTime(e.ts)}</div>
          </div>
          <div class="entry-stats">
            <span class="stat-pill cal-pill">${e.cal} kcal</span>
            <span class="stat-pill pro-pill">${e.pro}g</span>
            <button class="del-btn" onclick="deleteEntry(${realIdx})" aria-label="delete entry"><i class="ti ti-trash"></i></button>
          </div>
        </div>`;
      }).join('');
    }

    renderHistory();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addEntry() {
    const food = document.getElementById('food-input').value.trim();
    const cal = parseInt(document.getElementById('cal-input').value) || 0;
    const pro = parseInt(document.getElementById('pro-input').value) || 0;
    if (!food) { showToast('please enter a food description'); return; }
    if (!cal && !pro) { showToast('enter at least calories or protein'); return; }
    const entries = loadData();
    entries.push({ food, cal, pro, ts: Date.now() });
    saveData(entries);
    document.getElementById('food-input').value = '';
    document.getElementById('cal-input').value = '';
    document.getElementById('pro-input').value = '';
    document.getElementById('food-input').focus();
    showToast('logged ✓');
    render();
  }

  function deleteEntry(idx) {
    const entries = loadData();
    entries.splice(idx, 1);
    saveData(entries);
    render();
  }

  function clearDay() {
    if (!confirm('clear all entries for today?')) return;
    localStorage.removeItem(todayKey());
    render();
    showToast('day cleared');
  }

  document.getElementById('food-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('cal-input').focus(); });
  document.getElementById('cal-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('pro-input').focus(); });
  document.getElementById('pro-input').addEventListener('keydown', e => { if (e.key==='Enter') addEntry(); });

  render();
</script>
</body>
</html>
